# ============================================================================
#  kitty.conf — setup pessoal (Fedora GNOME/Wayland, Flexoki/Adwaita Dark)
#  Referência oficial: https://sw.kovidgoyal.net/kitty/conf/
# ============================================================================
#  Convenção: cada bloco explica o "porquê" da opção, não só o "o que".
#  Para validar este arquivo a qualquer momento: `kitty --debug-config`
# ============================================================================


# ----------------------------------------------------------------------------
# Fontes
# ----------------------------------------------------------------------------
# JetBrainsMono Nerd Font inclui os glifos do Nerd Fonts (ícones de Powerline,
# devicons, etc.) — necessários para o tab bar powerline mais abaixo e para
# prompts modernos (starship, p10k). O nome usado aqui é o "family name" que
# o fontconfig reporta; conferir com: `fc-list | grep -i jetbrains`.
# Igual ao Black Box: "JetBrainsMono Nerd Font Mono 16" (variante Mono = todos
# os glifos com largura monoespaçada).
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

# 16 pt — mesmo tamanho do Black Box.
font_size 16.0

# disable_ligatures aceita: never | always | cursor.
# "never" = NUNCA desabilita ligatures => elas ficam ativas o tempo todo.
# (É o default, mas explicitamos para deixar a intenção clara.)
disable_ligatures never


# ----------------------------------------------------------------------------
# Cursor
# ----------------------------------------------------------------------------
# block = bloco cheio (estilo terminal clássico, alta visibilidade).
# Alternativas: beam (barra fina, estilo editor) e underline (sublinhado).
cursor_shape block

# Intervalo de piscar em segundos. 0.5s = 1 ciclo por segundo, bem visível
# sem ficar epilético. -1 (default) usaria o valor do sistema.
cursor_blink_interval 0.5

# 0 = nunca para de piscar. O default (15.0s) faz o cursor congelar depois
# de inativo, o que pode ser confuso quando o terminal está em foco mas
# parado por mais de 15s.
cursor_stop_blinking_after 0

# Rastro animado do cursor: o bloco "desliza" até a nova posição em vez de
# teleportar. O valor é o threshold em ms de movimento a partir do qual o
# trail aparece. 1 = praticamente sempre mostra o rastro, bom pra guiar o
# olho de quem assiste quando você está apresentando código.
cursor_trail 1

# Tempo de fade do rastro em segundos: primeiro valor pro menor movimento,
# segundo pro maior. Default é 0.1 0.4. Cortei pela metade pra evaporar mais
# rápido e não deixar um borrão arrastando atrás do cursor.
cursor_trail_decay 0.05 0.2


# ----------------------------------------------------------------------------
# Janela / aparência
# ----------------------------------------------------------------------------
# 0.95 = 5% de transparência (bem leve: dá profundidade sem comer contraste).
# No GNOME/Wayland o Mutter não expõe protocolo de blur, então o gaussian blur
# NÃO vem do kitty: quem borra é a extensão Blur my Shell, no nível do
# compositor, mirando a janela do kitty (whitelist "kitty"). O terminal só
# precisa soltar a opacidade pra existir algo atrás pra ser borrado.
background_opacity 0.80

# Permite ajustar a opacidade em runtime (kitty @ set-background-opacity ou
# keybind) sem reiniciar. Sem isso, mudar background_opacity exige restart.
dynamic_background_opacity yes

# Padding interno entre o texto e a borda da janela (px).
# 12px dá "respiro" — convenção visual de terminais modernos (Warp/Ghostty).
window_padding_width 0

# "yes" = remove TODA a decoração do kitty (titlebar, logo, botões e bordas) =>
# visual minimalista. No Wayland o "titlebar-only" NÃO funciona (é só macOS,
# conforme a doc do kitty), então o libdecor é tudo-ou-nada.
# Os cantos arredondados + sombra no padrão do GNOME vêm da extensão
# "Rounded Window Corners Reborn" (rounded-window-corners@fxgn), que arredonda
# qualquer janela no nível do compositor e deixa reta quando maximizada.
hide_window_decorations yes

# 0 = nunca pedir confirmação ao fechar. Útil para quem fecha por reflexo.
# Use um inteiro positivo N para pedir confirmação se houver >N janelas.
confirm_os_window_close 0


# ----------------------------------------------------------------------------
# Tab bar
# ----------------------------------------------------------------------------
# Tabs embaixo: deixa o foco visual no conteúdo do terminal e não compete
# com a barra superior do GNOME no topo.
tab_bar_edge bottom

# Powerline = visual com separadores estilizados (precisa de Nerd Font).
tab_bar_style powerline

# Separadores inclinados (estilo Powerline clássico). Alternativas:
# angled (em diagonal aguda) e round (arredondado).
tab_powerline_style slanted


# ----------------------------------------------------------------------------
# Bell
# ----------------------------------------------------------------------------
# Desliga o "beep" sonoro. O bell visual (piscar de borda) continua ativo
# por default — controle por "visual_bell_duration" se quiser desligá-lo.
enable_audio_bell no


# ----------------------------------------------------------------------------
# Performance / latência
# ----------------------------------------------------------------------------
# Delay entre redraws em ms. 10ms (default) equilibra latência e uso de CPU
# em saídas tipo build/log com muito output.
repaint_delay 10

# Delay entre leituras de input em ms. 3ms (default) — baixo o suficiente
# pra digitação não parecer travada.
input_delay 3

# Sincroniza o swap com o refresh do monitor. Em compositores modernos
# (Mutter no GNOME/Wayland) elimina tearing visível em scroll rápido.
sync_to_monitor yes


# ----------------------------------------------------------------------------
# Remote control
# ----------------------------------------------------------------------------
# Permite que processos rodando dentro do kitty controlem a janela via
# `kitty @ <comando>`. Usado pelo autocommand do neovim para zerar o
# padding ao entrar e restaurar ao sair (init.lua).
#
# listen_on cria um socket Unix por instância (placeholder {kitty_pid}
# garante unicidade). Kitty exporta o caminho em $KITTY_LISTEN_ON para
# subprocessos, o que permite `kitty @ --to=$KITTY_LISTEN_ON ...` rodar
# de dentro de programas que capturam stdout/stdin (como vim.fn.system).
allow_remote_control yes
listen_on unix:@kitty-{kitty_pid}


# ----------------------------------------------------------------------------
# Shell integration
# ----------------------------------------------------------------------------
# Habilita integração com o shell: marcadores de prompt, cwd tracking
# (kitty sabe o diretório atual para "new tab with cwd"), sudo wrapper,
# completions, etc. Funciona out-of-the-box com bash, zsh e fish.
shell_integration enabled


# ----------------------------------------------------------------------------
# Scrollback
# ----------------------------------------------------------------------------
# Mantém 10k linhas no histórico — confortável para ler logs longos sem
# perder o topo. O kitty usa RAM por janela; 10k é seguro.
scrollback_lines 10000


# ============================================================================
# KEYBINDINGS
# ============================================================================
# Sintaxe: map <combo> <ação>. Ações conferidas em:
# https://sw.kovidgoyal.net/kitty/actions/
# ============================================================================

# Nova "window" do kitty (split dentro da tab atual). É a mesma ação que
# o default do kitty associa a Ctrl+Shift+Enter.
map ctrl+shift+enter new_window

# Nova tab.
map ctrl+shift+t     new_tab

# Fecha a tab atual. (O default do kitty para Ctrl+Shift+W é close_window,
# mas você pediu close_tab — sobrescrevemos.)
map ctrl+shift+w     close_tab

# Navegação entre tabs.
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab

# Navegação entre splits (windows) estilo Vim.
# Direções aceitas por neighboring_window: left, right, top, bottom.
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window bottom
map ctrl+shift+k neighboring_window top
map ctrl+shift+l neighboring_window right

# Tamanho da fonte. "all" = aplica a todas as OS windows abertas.
# Ctrl+Shift+= porque Shift+= é o "+" em layouts US/BR-ABNT2.
map ctrl+shift+equal change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0

# Maximizar em vez de fullscreen real. No GNOME 50/Wayland o fullscreen real do
# Mutter descarta a transparência da janela (comportamento intencional desde a
# 43.1), o que apaga o blur+opacity. Maximizado preserva os dois. A top bar do
# GNOME segue visível neste modo (resolvida separadamente, fora do kitty).
map f11 toggle_maximized


# ============================================================================
# TEMA
# ============================================================================
# Flexoki Dark — paleta criada por Steph Ango (https://stephango.com/flexoki).
# Background quase-preto (#100F0F), foreground bege quente (#CECDC3),
# tons terrosos e baixa saturação para reduzir fadiga visual.
# Mantido em arquivo separado para facilitar trocar sem mexer no resto.
# ============================================================================
include themes/adwaita-dark.conf
