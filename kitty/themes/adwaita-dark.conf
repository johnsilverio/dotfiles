# ============================================================================
#  Adwaita Dark — paleta EXATA do Black Box (/usr/share/blackbox/schemes/
#  adwaita-dark.json). Background #1E1E1E, foreground #ffffff, mesmas 16 cores
#  ANSI do GNOME Adwaita. Mantém o kitty visualmente idêntico ao Black Box.
# ============================================================================

background  #1E1E1E
foreground  #ffffff

# Cursor (Adwaita usa a cor de texto = branco; texto sob o cursor = fundo)
cursor              #ffffff
cursor_text_color   #1E1E1E

# Seleção (azul de acento do Adwaita)
selection_background #3584E4
selection_foreground #ffffff

# 16 cores ANSI (idênticas ao adwaita-dark.json do Black Box)
color0  #241F31
color1  #C01C28
color2  #2EC27E
color3  #F5C211
color4  #1E78E4
color5  #9841BB
color6  #0AB9DC
color7  #C0BFBC
color8  #5E5C64
color9  #ED333B
color10 #57E389
color11 #F8E45C
color12 #51A1FF
color13 #C061CB
color14 #4FD2FD
color15 #F6F5F4
