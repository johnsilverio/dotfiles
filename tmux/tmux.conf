# ─────────────────────────────────────────────────────────────────────────────
# tmux.conf — XDG location: ~/.config/tmux/tmux.conf
# Stack: Kitty + Neovim (kickstart) + Fedora KDE host + FreeBSD VM (SSH)
# ─────────────────────────────────────────────────────────────────────────────

# ── Server / terminal ──────────────────────────────────────────────────────
set-option -g  default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -ga terminal-overrides ",xterm-kitty:Tc"
set-option -g  focus-events on

# Teclas estendidas (kitty keyboard protocol / CSI-u). Sem isto, o tmux entrega
# Ctrl+Backspace como o byte legado \x08 (= Ctrl+H), que cai na navegacao de
# painel do vim-tmux-navigator ("muda de painel"). Com extended-keys o tmux
# distingue Ctrl+Backspace de Ctrl+H e repassa pro fish (backward-kill-word).
set-option -s  extended-keys on
set-option -as terminal-features 'xterm*:extkeys'
set-option -sg escape-time 0
set-option -g  history-limit 50000
set-option -g  renumber-windows on
set-option -g  base-index 1
set-window-option -g pane-base-index 1
set-option -g  detach-on-destroy off
set-option -g  mouse on
set-option -g  status-position top

# ── Prefix: Ctrl-a ─────────────────────────────────────────────────────────
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ── Reload config ──────────────────────────────────────────────────────────
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# ── Splits (mantêm CWD) ────────────────────────────────────────────────────
unbind '"'
unbind %
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key c new-window      -c "#{pane_current_path}"

# ── Resize panes (prefix + H/J/K/L) ────────────────────────────────────────
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# ── Kill com confirmação ───────────────────────────────────────────────────
bind-key x confirm-before -p "kill pane #P? (y/n)"  kill-pane
bind-key & confirm-before -p "kill window #W? (y/n)" kill-window

# ── Window cycling / direct jump (1..9 já é padrão) ────────────────────────
bind-key n next-window
bind-key p previous-window

# ── Copy mode: vi ──────────────────────────────────────────────────────────
set-window-option -g mode-keys vi
bind-key [ copy-mode
bind-key ] paste-buffer
bind-key -T copy-mode-vi v       send-keys -X begin-selection
bind-key -T copy-mode-vi V       send-keys -X select-line
bind-key -T copy-mode-vi C-v     send-keys -X rectangle-toggle
# y é fornecido pelo tmux-yank (clipboard do sistema)

# ── vim-tmux-navigator (passthrough Ctrl-h/j/k/l p/ vim/nvim/fzf) ──────────
# Detecta se o pane está rodando vim/nvim/view/fzf e repassa o atalho.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
# Ctrl-l fica de fora de proposito: reservado para "limpar a tela" no shell
# (clear-screen do fish). Para ir ao painel da direita a partir de um shell use
# prefix+l; dentro do vim o Ctrl-l continua navegando (o plugin cuida das bordas).
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Também expõe via prefix (sem conflitar com passthrough nativo)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# ─────────────────────────────────────────────────────────────────────────────
# Plugins (TPM)
# ─────────────────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# ── tmux-resurrect ─────────────────────────────────────────────────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'   # restaura sessions do Neovim
set -g @resurrect-dir '~/.local/share/tmux/resurrect'   # caminho fixo do save

# ── tmux-continuum ─────────────────────────────────────────────────────────
# Auto-restaura SÓ se já existe um save. Sem save (1ª vez), não tenta restaurar
# — então não aparece o "Tmux resurrect file not found!" e o tmux abre limpo.
# O continuum continua SALVANDO normalmente (a cada 15 min); depois do 1º save,
# a próxima abertura passa a restaurar sozinha.
if-shell '[ -e ~/.local/share/tmux/resurrect/last ]' \
    "set -g @continuum-restore 'on'" \
    "set -g @continuum-restore 'off'"
set -g @continuum-save-interval '15'

# ─────────────────────────────────────────────────────────────────────────────
# Inicializa o TPM — DEVE ficar perto do final do arquivo.
# Bootstrap automático: clona o TPM se não existir.
# ─────────────────────────────────────────────────────────────────────────────
if-shell "test ! -d ~/.config/tmux/plugins/tpm" \
    "run-shell 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'

# ─────────────────────────────────────────────────────────────────────────────
# Status bar — minimalista, paleta Oxocarbon (mesma do Neovim / nyoom-engineering).
# Oxocarbon: bg #161616  bg1 #262626  bg2 #393939  gray #525252  fg #dde1e6
#            blue #78a9ff  cyan #3ddbd9  purple #be95ff  pink #ee5396  green #42be65
# ─────────────────────────────────────────────────────────────────────────────
set -g status-style              "bg=#161616,fg=#dde1e6"
set -g status-justify            centre
set -g status-left-length        60
set -g status-right-length       120
set -g status-interval           5

# Esquerda: sessão (azul oxocarbon)
set -g status-left  "#[fg=#161616,bg=#78a9ff,bold] #S #[fg=#78a9ff,bg=#161616] "

# Centro: lista de windows (sem ícones, sem separadores arredondados)
set -g window-status-format          "#[fg=#525252] #I:#W "
set -g window-status-current-format  "#[fg=#161616,bg=#be95ff,bold] #I:#W "
set -g window-status-separator       ""

# Direita: continuum (last save) · host · data/hora
set -g status-right  "#[fg=#42be65]saved #{continuum_status}m "
set -ag status-right "#[fg=#393939]│ #[fg=#3ddbd9]#h "
set -ag status-right "#[fg=#393939]│ #[fg=#dde1e6]%Y-%m-%d %H:%M "

# Bordas de pane: linhas retas, cor sutil; ativa em destaque
set -g pane-border-style         "fg=#393939"
set -g pane-active-border-style  "fg=#78a9ff"

# Mensagens / modo de comando
set -g message-style              "bg=#161616,fg=#3ddbd9"
set -g message-command-style      "bg=#161616,fg=#3ddbd9"
set -g mode-style                 "bg=#78a9ff,fg=#161616"

# ─────────────────────────────────────────────────────────────────────────────
# Copy mode com mouse — mantém o destaque (NÃO cancela ao soltar).
# DEVE vir depois do TPM para sobrescrever os bindings do tmux-yank.
# Ao soltar o arrasto: copia pro clipboard (wl-copy) E mantém a seleção
# destacada (você continua no copy-mode). Saia com q ou Esc.
# ─────────────────────────────────────────────────────────────────────────────
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear wl-copy
bind-key -T copy-mode-vi DoubleClick1Pane \
    select-pane \; send-keys -X select-word \; send-keys -X copy-pipe-no-clear wl-copy
bind-key -T copy-mode-vi TripleClick1Pane \
    select-pane \; send-keys -X select-line \; send-keys -X copy-pipe-no-clear wl-copy
# Seleção pelo teclado (v + movimento, y copia). 'y' mantém o destaque também.
bind-key -T copy-mode-vi y send-keys -X copy-pipe-no-clear wl-copy

# ─────────────────────────────────────────────────────────────────────────────
# Clique direito: desabilita o menu de contexto do tmux (que competia com o
# menu nativo do Black Box). Sem mexer no mouse on. Para o menu NATIVO do
# terminal, use Shift + clique-direito.
# ─────────────────────────────────────────────────────────────────────────────
unbind -n MouseDown3Pane
unbind -n MouseDown3Status
unbind -n MouseDown3StatusLeft

# ── Ctrl+L = limpar a tela (override do vim-tmux-navigator) ─────────────────
# O plugin vim-tmux-navigator religa 'bind -n C-l' toda vez que o config carrega,
# entao o unbind precisa vir DEPOIS do TPM. Sem isto, Ctrl+L ia pro painel da
# direita em vez de limpar. Navegacao p/ direita a partir do shell: prefix+l.
unbind -n C-l
