# Tokyo Dark — cores da status bar (aplicado por bin/tmux-theme).
# base #11121d  high #353945  grey #4a5057  fg #a0a8cd
# blue #7199ee  cyan #38a89d  purple #a485dd  green #95c561
set -g status-style              "bg=#11121d,fg=#a0a8cd"
set -g status-left               "#[fg=#11121d,bg=#7199ee,bold] #S #[fg=#7199ee,bg=#11121d] "
set -g window-status-format          "#[fg=#4a5057] #I:#W "
set -g window-status-current-format  "#[fg=#11121d,bg=#a485dd,bold] #I:#W "
set -g status-right              "#[fg=#95c561]saved #{continuum_status}m "
set -ag status-right             "#[fg=#353945]│ #[fg=#38a89d]#h "
set -ag status-right             "#[fg=#353945]│ #[fg=#a0a8cd]%Y-%m-%d %H:%M "
set -g pane-border-style         "fg=#353945"
set -g pane-active-border-style  "fg=#7199ee"
set -g message-style             "bg=#11121d,fg=#38a89d"
set -g message-command-style     "bg=#11121d,fg=#38a89d"
set -g mode-style                "bg=#7199ee,fg=#11121d"
