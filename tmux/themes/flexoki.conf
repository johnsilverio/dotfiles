# Flexoki (moon/dark) — cores da status bar (aplicado por bin/tmux-theme).
# base #100f0f  high #403e3c  muted #575653  text #cecdc3
# blue #4385be  cyan #3aa99f  purple #8b7ec8  green #879a39
set -g status-style              "bg=#100f0f,fg=#cecdc3"
set -g status-left               "#[fg=#100f0f,bg=#4385be,bold] #S #[fg=#4385be,bg=#100f0f] "
set -g window-status-format          "#[fg=#575653] #I:#W "
set -g window-status-current-format  "#[fg=#100f0f,bg=#8b7ec8,bold] #I:#W "
set -g status-right              "#[fg=#879a39]saved #{continuum_status}m "
set -ag status-right             "#[fg=#403e3c]│ #[fg=#3aa99f]#h "
set -ag status-right             "#[fg=#403e3c]│ #[fg=#cecdc3]%Y-%m-%d %H:%M "
set -g pane-border-style         "fg=#403e3c"
set -g pane-active-border-style  "fg=#4385be"
set -g message-style             "bg=#100f0f,fg=#3aa99f"
set -g message-command-style     "bg=#100f0f,fg=#3aa99f"
set -g mode-style                "bg=#4385be,fg=#100f0f"
