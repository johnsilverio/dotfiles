# gruvbox — cores da status bar (gerado a partir da paleta do tema nvim).
set -g status-style              "bg=#282828,fg=#ebdbb2"
set -g status-left               "#[fg=#282828,bg=#b8bb26,bold] #S #[fg=#b8bb26,bg=#282828] "
set -g window-status-format          "#[fg=#928374] #I:#W "
set -g window-status-current-format  "#[fg=#282828,bg=#fb4934,bold] #I:#W "
set -g status-right              "#[fg=#b8bb26]saved #{continuum_status}m "
set -ag status-right             "#[fg=#665c54]│ #[fg=#fabd2f]#h "
set -ag status-right             "#[fg=#665c54]│ #[fg=#ebdbb2]%Y-%m-%d %H:%M "
set -g pane-border-style         "fg=#665c54"
set -g pane-active-border-style  "fg=#b8bb26"
set -g message-style             "bg=#282828,fg=#fabd2f"
set -g message-command-style     "bg=#282828,fg=#fabd2f"
set -g mode-style                "bg=#b8bb26,fg=#282828"
