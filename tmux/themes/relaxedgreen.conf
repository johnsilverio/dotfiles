# relaxedgreen — cores da status bar (gerado a partir da paleta do tema nvim).
set -g status-style              "bg=#000000,fg=#aaaaaa"
set -g status-left               "#[fg=#000000,bg=#22bb22,bold] #S #[fg=#22bb22,bg=#000000] "
set -g window-status-format          "#[fg=#00a594] #I:#W "
set -g window-status-current-format  "#[fg=#000000,bg=#ac0000,bold] #I:#W "
set -g status-right              "#[fg=#b3f6c0]saved #{continuum_status}m "
set -ag status-right             "#[fg=#336633]│ #[fg=#559955]#h "
set -ag status-right             "#[fg=#336633]│ #[fg=#aaaaaa]%Y-%m-%d %H:%M "
set -g pane-border-style         "fg=#336633"
set -g pane-active-border-style  "fg=#22bb22"
set -g message-style             "bg=#000000,fg=#559955"
set -g message-command-style     "bg=#000000,fg=#559955"
set -g mode-style                "bg=#22bb22,fg=#000000"
