# Cyberdream (dark) — cores da status bar (aplicado por bin/tmux-theme).
# base #16181a  high #3c4048  grey #7b8496  fg #ffffff
# blue #5ea1ff  cyan #5ef1ff  purple #bd5eff  green #5eff6c
set -g status-style              "bg=#16181a,fg=#ffffff"
set -g status-left               "#[fg=#16181a,bg=#5ea1ff,bold] #S #[fg=#5ea1ff,bg=#16181a] "
set -g window-status-format          "#[fg=#7b8496] #I:#W "
set -g window-status-current-format  "#[fg=#16181a,bg=#bd5eff,bold] #I:#W "
set -g status-right              "#[fg=#5eff6c]saved #{continuum_status}m "
set -ag status-right             "#[fg=#3c4048]│ #[fg=#5ef1ff]#h "
set -ag status-right             "#[fg=#3c4048]│ #[fg=#ffffff]%Y-%m-%d %H:%M "
set -g pane-border-style         "fg=#3c4048"
set -g pane-active-border-style  "fg=#5ea1ff"
set -g message-style             "bg=#16181a,fg=#5ef1ff"
set -g message-command-style     "bg=#16181a,fg=#5ef1ff"
set -g mode-style                "bg=#5ea1ff,fg=#16181a"
