# moonfly — cores da status bar (gerado a partir da paleta do tema nvim).
set -g status-style              "bg=#080808,fg=#c6c6c6"
set -g status-left               "#[fg=#080808,bg=#74b2ff,bold] #S #[fg=#74b2ff,bg=#080808] "
set -g window-status-format          "#[fg=#949494] #I:#W "
set -g window-status-current-format  "#[fg=#080808,bg=#cf87e8,bold] #I:#W "
set -g status-right              "#[fg=#c6c684]saved #{continuum_status}m "
set -ag status-right             "#[fg=#323437]│ #[fg=#36c692]#h "
set -ag status-right             "#[fg=#323437]│ #[fg=#c6c6c6]%Y-%m-%d %H:%M "
set -g pane-border-style         "fg=#323437"
set -g pane-active-border-style  "fg=#74b2ff"
set -g message-style             "bg=#080808,fg=#36c692"
set -g message-command-style     "bg=#080808,fg=#36c692"
set -g mode-style                "bg=#74b2ff,fg=#080808"
