# Kanagawa Dragon — cores da status bar (aplicado por bin/tmux-theme).
# base #181616  high #393836  ash #737c73  white #c5c9c5
# blue #8ba4b0  aqua #8ea4a2  pink #a292a3  green #87a987
set -g status-style              "bg=#181616,fg=#c5c9c5"
set -g status-left               "#[fg=#181616,bg=#8ba4b0,bold] #S #[fg=#8ba4b0,bg=#181616] "
set -g window-status-format          "#[fg=#737c73] #I:#W "
set -g window-status-current-format  "#[fg=#181616,bg=#a292a3,bold] #I:#W "
set -g status-right              "#[fg=#87a987]saved #{continuum_status}m "
set -ag status-right             "#[fg=#393836]│ #[fg=#8ea4a2]#h "
set -ag status-right             "#[fg=#393836]│ #[fg=#c5c9c5]%Y-%m-%d %H:%M "
set -g pane-border-style         "fg=#393836"
set -g pane-active-border-style  "fg=#8ba4b0"
set -g message-style             "bg=#181616,fg=#8ea4a2"
set -g message-command-style     "bg=#181616,fg=#8ea4a2"
set -g mode-style                "bg=#8ba4b0,fg=#181616"
