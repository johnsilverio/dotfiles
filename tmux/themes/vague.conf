# vague — cores da status bar (gerado a partir da paleta do tema nvim).
set -g status-style              "bg=#141415,fg=#cdcdcd"
set -g status-left               "#[fg=#141415,bg=#6e94b2,bold] #S #[fg=#6e94b2,bg=#141415] "
set -g window-status-format          "#[fg=#606079] #I:#W "
set -g window-status-current-format  "#[fg=#141415,bg=#c48282,bold] #I:#W "
set -g status-right              "#[fg=#e8b589]saved #{continuum_status}m "
set -ag status-right             "#[fg=#333738]│ #[fg=#9bb4bc]#h "
set -ag status-right             "#[fg=#333738]│ #[fg=#cdcdcd]%Y-%m-%d %H:%M "
set -g pane-border-style         "fg=#333738"
set -g pane-active-border-style  "fg=#6e94b2"
set -g message-style             "bg=#141415,fg=#9bb4bc"
set -g message-command-style     "bg=#141415,fg=#9bb4bc"
set -g mode-style                "bg=#6e94b2,fg=#141415"
